name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Verify package version matches release tag
        run: |
          PKG_VERSION="v$(bun -e "console.log(require('./package.json').version)")"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "package.json version ($PKG_VERSION) does not match release tag (${{ github.ref_name }})"
            exit 1
          fi

      - run: bun run check

      - run: bun publish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
