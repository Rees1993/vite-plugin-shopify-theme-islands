name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Type check
        run: bun run check
      - name: Run tests
        run: bun test
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format --check
