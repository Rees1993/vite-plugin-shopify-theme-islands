name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push version commits + create git tags + GitHub Releases
      pull-requests: write  # create/update the Version Packages PR
      id-token: write       # npm provenance attestation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for changeset detection

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - uses: changesets/action@v1
        with:
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"   # replaces --provenance flag from old publish.yml
